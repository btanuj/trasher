<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Trash Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f060;
    --dim: #555;
    --text: #e8e8e8;
    --muted: #888;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .today-banner {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .today-banner span {
    color: var(--muted);
  }

  .cards {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 90px 1fr;
    align-items: center;
    gap: 16px;
    animation: slideIn 0.3s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
  }

  .card.is-today::before { background: var(--accent); }
  .card.is-holiday::before { background: #f06060; }
  .card.is-today { border-color: #333; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  .date-col { text-align: right; }

  .day-name {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card.is-today .day-name { color: var(--accent); }

  .date-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: #444;
  }

  .card.is-today .date-num { color: var(--accent); }

  .month-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .event-col {}

  .today-tag {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
    display: none;
  }

  .card.is-today .today-tag { display: block; }

  .event-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .card.is-holiday .event-name { color: #f06060; }

  .event-type {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 1px;
  }

  .no-event {
    font-size: 12px;
    color: var(--dim);
  }

  .footer {
    margin-top: 28px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>

  <div class="today-banner">Today is <span id="todayLabel"></span></div>
</div>

<div class="cards" id="cards"></div>

};

const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function toKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function render() {
  const today = new Date();
  document.getElementById('todayLabel').textContent =
    `${DAYS[today.getDay()]}, ${MONTHS[today.getMonth()]} ${today.getDate()}`;

  const container = document.getElementById('cards');
  let shown = 0;
  let isFirst = true;
  let cursor = new Date(today);

  while (shown < 5) {
    const key = toKey(cursor);
    const entry = schedule[key];

    if (entry) {
      const [type, label] = entry;
      const isHoliday = type === 'HOLIDAY';
      const isNext = isFirst && !isHoliday;

      const card = document.createElement('div');
      card.className = `card${isNext ? ' is-today' : ''}${isHoliday ? ' is-holiday' : ''}`;
      card.innerHTML = `
        <div class="date-col">
          <div class="day-name">${DAYS[cursor.getDay()].slice(0,3)}</div>
          <div class="date-num">${cursor.getDate()}</div>
          <div class="month-label">${MONTHS[cursor.getMonth()]}</div>
        </div>
        <div class="event-col">
          <div class="today-tag">▶ Next Pickup</div>
          <div class="event-name">${label}</div>
          <div class="event-type">${isHoliday ? '' : type}</div>
        </div>
      `;
      container.appendChild(card);
      if (isNext) isFirst = false;
      shown++;
    }

    cursor.setDate(cursor.getDate() + 1);
    if (cursor.getFullYear() > 2026) break;
  }
}

render();

// Stale year check
const scheduleYear = 2026;
const currentYear = new Date().getFullYear();
if (currentYear > scheduleYear) {
    const stale = document.createElement('div');
    stale.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        background: #333;
        color: #f0a060;
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        text-align: center;
        padding: 10px;
        letter-spacing: 1px;
        z-index: 999;
    `;
    stale.textContent = 'Schedule is stale. Consider updating — year has changed.';
    document.body.prepend(stale);
}
